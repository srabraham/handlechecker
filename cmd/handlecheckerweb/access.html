<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Access required — handlechecker</title>
<style>
  :root { --bg:#0f1115; --card:#1a1d24; --card-border:#2a2e38; --text:#e6e8ec;
          --muted:#9aa1ad; --accent:#4f8cff; --reject:#d1242f; }
  * { box-sizing: border-box; }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
         font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
         background:var(--bg); color:var(--text); line-height:1.45; padding:1rem; }
  .card { width:100%; max-width:400px; background:var(--card); border:1px solid var(--card-border);
          border-radius:12px; padding:1.75rem; }
  h1 { margin:0 0 .3rem; font-size:1.4rem; }
  p.tagline { color:var(--muted); margin:0 0 1.5rem; }
  label { display:block; font-weight:600; margin-bottom:.4rem; }
  input { width:100%; background:#0f1115; color:var(--text); border:1px solid var(--card-border);
          border-radius:8px; padding:.6rem .7rem; font:inherit;
          font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
  input:focus { outline:none; border-color:var(--accent); }
  button { margin-top:1rem; width:100%; font:inherit; font-weight:600; background:var(--accent);
           border:1px solid var(--accent); color:#fff; padding:.6rem; border-radius:8px; cursor:pointer; }
  button:hover { filter:brightness(1.08); }
  .error { color:var(--reject); font-size:.9rem; margin:0 0 1rem; }
</style>
</head>
<body>
  <main class="card">
    <h1>Access required</h1>
    <p class="tagline">This handle checker is private. Enter your access key to continue.</p>
    {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
    <form method="get" action="{{.Action}}">
      <label for="key">Access key</label>
      <input id="key" name="key" type="password" autocomplete="current-password"
             autofocus required placeholder="Enter access key"{{if .Disabled}} disabled{{end}}>
      <button type="submit"{{if .Disabled}} disabled{{end}}>Continue</button>
    </form>
  </main>
</body>
</html>
