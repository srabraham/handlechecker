# Run the handle-checker web app publicly with auto-provisioned Let's Encrypt
# TLS. The server speaks ACME itself (no certbot) and auto-renews.
#
#   1. Point your domain's DNS (A/AAAA) at this host.
#   2. Copy .env.example to .env and set TLS_DOMAIN (and ideally TLS_EMAIL).
#   3. docker compose up -d --build
#
# Certificates are cached in ./certs on the host so they survive restarts and
# re-deploys — important, because Let's Encrypt enforces issuance rate limits.

services:
  web:
    build: .
    image: handlechecker
    # The image defaults to the CLI; override to run the web server.
    entrypoint: ["handlecheckerweb"]
    command:
      - "--tls-domain=${TLS_DOMAIN:?set TLS_DOMAIN in .env, e.g. handles.example.org}"
      - "--tls-email=${TLS_EMAIL:-}"
      - "--tls-cache=/certs"
      # Flip to true while testing to use the Let's Encrypt staging CA (untrusted
      # certs, but far higher rate limits) so you don't burn the real quota.
      - "--tls-staging=${TLS_STAGING:-false}"
    environment:
      # Optional shared-key gate. Comma-separated secrets; a visitor must present
      # one via ?key=SECRET, an X-Access-Key header, or HTTP Basic Auth (the key
      # is the password, username ignored). Leave empty/unset to keep the site
      # open. Set it in .env, NOT here, so secrets stay out of version control.
      - "ACCESS_KEYS=${ACCESS_KEYS:-}"
    ports:
      - "${HOST_TLS_PORT:-443}:443" # HTTPS
      - "${HOST_HTTP_PORT:-80}:80"   # ACME HTTP-01 challenge + HTTP→HTTPS redirect (needed for issuance/renewal)
    volumes:
      # Persist the TLS cache (certificates + ACME account key) on the host.
      - ./certs:/certs
    restart: unless-stopped
